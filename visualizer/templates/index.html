<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <div id="controls">
            <div class="control-group">
                <div class="value-display">FPS: <span id="actualFps">--</span></div>
                <div class="value-display">Step: <span id="stepDisplay">0</span></div>
                <div class="value-display" id="distDisplay" style="display:none">Dist: <span id="distValue">--</span></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Per-robot state
        let robots = [];       // topology data per robot
        let robotState = [];   // live positions / activations per robot
        let currentStep = 0;

        const actualFpsDisplay = document.getElementById('actualFps');
        const stepDisplay = document.getElementById('stepDisplay');
        const distDisplay = document.getElementById('distDisplay');
        const distValue = document.getElementById('distValue');

        // Role → colour scheme
        const ROLE_COLORS = {
            predator: { mass: '#E63946', spring_cmap: 'magma'  },
            prey:     { mass: '#457B9D', spring_cmap: 'viridis' },
            single:   { mass: '#FFD166', spring_cmap: 'magma'  },
        };

        // Canvas setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Colormaps
        const colormaps = {
            magma: [
                [0.001462, 0.000466, 0.013866],
                [0.063536, 0.028426, 0.118956],
                [0.188923, 0.071159, 0.232229],
                [0.316654, 0.071689, 0.314706],
                [0.444667, 0.074981, 0.383823],
                [0.566949, 0.094290, 0.440529],
                [0.680280, 0.131803, 0.484307],
                [0.780105, 0.188923, 0.515993],
                [0.864406, 0.265113, 0.536616],
                [0.933010, 0.359688, 0.548053],
                [0.987053, 0.991438, 0.749504]
            ],
            viridis: [
                [0.267004, 0.004874, 0.329415],
                [0.282327, 0.140926, 0.457517],
                [0.253935, 0.265254, 0.529983],
                [0.206756, 0.371758, 0.553117],
                [0.163625, 0.471133, 0.558148],
                [0.127568, 0.566949, 0.550556],
                [0.134692, 0.658636, 0.517649],
                [0.266941, 0.748751, 0.440573],
                [0.477504, 0.821444, 0.318195],
                [0.741388, 0.873449, 0.149561],
                [0.993248, 0.906157, 0.143936]
            ],
        };

        function getColor(value, cmapName) {
            value = Math.max(0, Math.min(1, value));
            const cmap = colormaps[cmapName] || colormaps.magma;
            const n = cmap.length - 1;
            const idx = value * n;
            const i0 = Math.floor(idx);
            const i1 = Math.min(n, Math.ceil(idx));
            const t = idx - i0;
            const c0 = cmap[i0], c1 = cmap[i1];
            const r = Math.floor((c0[0] + t * (c1[0] - c0[0])) * 255);
            const g = Math.floor((c0[1] + t * (c1[1] - c0[1])) * 255);
            const b = Math.floor((c0[2] + t * (c1[2] - c0[2])) * 255);
            return `rgb(${r},${g},${b})`;
        }

        // Camera follows midpoint of all robots' centres
        function getCameraCenter() {
            if (robotState.length === 0) return [0, 0];
            let sx = 0, sy = 0;
            for (const rs of robotState) {
                sx += rs.center_of_mass[0];
                sy += rs.center_of_mass[1];
            }
            return [sx / robotState.length, sy / robotState.length];
        }

        function worldToScreen(x, y) {
            const scale = 600;
            const cam = getCameraCenter();
            const cx = canvas.width / 2;
            const cy = canvas.height * 0.8;
            return {
                x: cx + (x - cam[0]) * scale,
                y: cy - y * scale
            };
        }

        function draw() {
            ctx.fillStyle = '#c5d5e0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ground grid
            const gridSpacing = 0.5;
            const cam = getCameraCenter();
            const numLines = Math.ceil(canvas.width / 600 / gridSpacing) + 4;
            const startX = Math.floor(cam[0] / gridSpacing) * gridSpacing - numLines / 2 * gridSpacing;
            const groundY = worldToScreen(0, 0.02).y;

            ctx.strokeStyle = '#6b8ca3';
            ctx.lineWidth = 2;
            for (let i = 0; i < numLines; i++) {
                const wx = startX + i * gridSpacing;
                const sp = worldToScreen(wx, 0);
                ctx.beginPath(); ctx.moveTo(sp.x, groundY); ctx.lineTo(sp.x, canvas.height); ctx.stroke();
            }
            ctx.strokeStyle = '#3d5a6b'; ctx.lineWidth = 3;
            for (let i = 0; i < numLines; i++) {
                const wx = startX + i * gridSpacing;
                const sp = worldToScreen(wx, 0);
                ctx.beginPath(); ctx.moveTo(sp.x, groundY - 8); ctx.lineTo(sp.x, groundY + 8); ctx.stroke();
            }
            ctx.strokeStyle = '#4a6b80'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

            // Draw distance line between first two robots (if predator/prey mode)
            if (robotState.length === 2) {
                const c0 = robotState[0].center_of_mass;
                const c1 = robotState[1].center_of_mass;
                const s0 = worldToScreen(c0[0], c0[1]);
                const s1 = worldToScreen(c1[0], c1[1]);
                ctx.setLineDash([6, 4]);
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(s0.x, s0.y); ctx.lineTo(s1.x, s1.y); ctx.stroke();
                ctx.setLineDash([]);
                const dx = c0[0] - c1[0], dy = c0[1] - c1[1];
                const dist = Math.sqrt(dx*dx + dy*dy);
                distValue.textContent = dist.toFixed(3);
                distDisplay.style.display = '';
            }

            // Draw each robot
            for (let ri = 0; ri < robots.length; ri++) {
                const topo = robots[ri];
                const st = robotState[ri];
                if (!topo || !st || !st.positions || st.positions.length === 0) continue;
                const role = topo.role || 'single';
                const scheme = ROLE_COLORS[role] || ROLE_COLORS.single;

                // Springs
                ctx.lineWidth = 3;
                for (let si = 0; si < topo.springs.length; si++) {
                    const sp = topo.springs[si];
                    const p1 = st.positions[sp[0]], p2 = st.positions[sp[1]];
                    if (!p1 || !p2) continue;
                    const s1 = worldToScreen(p1[0], p1[1]);
                    const s2 = worldToScreen(p2[0], p2[1]);
                    const act = st.activations[si] !== undefined ? st.activations[si] : 0.5;
                    ctx.strokeStyle = getColor(act, scheme.spring_cmap);
                    ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
                }
                // Masses
                ctx.fillStyle = scheme.mass;
                for (let mi = 0; mi < st.positions.length; mi++) {
                    const pos = st.positions[mi];
                    if (!pos) continue;
                    const sp = worldToScreen(pos[0], pos[1]);
                    ctx.beginPath(); ctx.arc(sp.x, sp.y, 5, 0, 2 * Math.PI); ctx.fill();
                }
            }
        }

        // Start SSE stream
        function startStream() {
            const es = new EventSource('/stream');
            es.onmessage = (event) => {
                if (!event.data) return;
                const msg = JSON.parse(event.data);

                if (msg.type === 'topology') {
                    robots = msg.robots;
                    robotState = robots.map(() => ({ positions: [], activations: [], center_of_mass: [0,0] }));
                    console.log(`Loaded ${robots.length} robot(s)`);
                } else if (msg.type === 'step') {
                    for (let i = 0; i < msg.robots.length; i++) {
                        robotState[i] = msg.robots[i];
                    }
                    currentStep = msg.step;
                    stepDisplay.textContent = currentStep;
                    if (msg.fps !== undefined) actualFpsDisplay.textContent = msg.fps.toFixed(0);
                    draw();
                }
            };
            es.onerror = (err) => console.error('EventSource error:', err);
        }

        window.addEventListener('load', () => { startStream(); draw(); });
    </script>
</body>
</html>
